<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>ESAN RV- Trayectoria Histórica</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // ========================================================
      // COMPONENTE THREE.JS: CUBOS VIVOS (ROJO, CELESTE, BLANCO)
      // ========================================================
      AFRAME.registerComponent('cubos-digitales', {
        init: function () {
          const scene3D = this.el.sceneEl.object3D;
          this.count = 1000; 
          
          this.geometry = new THREE.BufferGeometry();
          const positions = new Float32Array(this.count * 3);
          const colors = new Float32Array(this.count * 3);
          
          const colorRojo = new THREE.Color(0xff0026);    
          const colorCeleste = new THREE.Color(0x00bfff); 
          const colorBlanco = new THREE.Color(0xffffff);  
          
          this.velocities = [];

          for (let i = 0; i < this.count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 40 + 1.6; 
            positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            
            const rand = Math.random();
            let selectedColor;
            if (rand < 0.33) {
              selectedColor = colorRojo;
            } else if (rand < 0.66) {
              selectedColor = colorCeleste;
            } else {
              selectedColor = colorBlanco;
            }
            
            colors[i * 3] = selectedColor.r;
            colors[i * 3 + 1] = selectedColor.g;
            colors[i * 3 + 2] = selectedColor.b;

            this.velocities.push((Math.random() - 0.5) * 0.02); 
            this.velocities.push((Math.random() - 0.5) * 0.02); 
            this.velocities.push((Math.random() - 0.5) * 0.02); 
          }
          
          this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
          this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
          
          const canvas = document.createElement('canvas');
          canvas.width = 16;
          canvas.height = 16;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 16, 16);
          const texture = new THREE.CanvasTexture(canvas);

          this.material = new THREE.PointsMaterial({
            size: 0.22,
            vertexColors: true,
            transparent: true,
            opacity: 1.0,
            map: texture,
            blending: THREE.NormalBlending
          });
          
          this.particleSystem = new THREE.Points(this.geometry, this.material);
          scene3D.add(this.particleSystem);
        },
        
        tick: function (time, timeDelta) {
          if (!this.particleSystem) return;
          
          const pos = this.geometry.attributes.position.array;
          this.material.size = (Math.sin(time * 0.002) * 0.08) + 0.20;

          for (let i = 0; i < this.count; i++) {
            const i3 = i * 3;
            pos[i3] += this.velocities[i3];
            pos[i3 + 1] += this.velocities[i3 + 1];
            pos[i3 + 2] += this.velocities[i3 + 2];
            
            if (Math.abs(pos[i3]) > 25) this.velocities[i3] *= -1;
            if (Math.abs(pos[i3 + 1] - 1.6) > 20) this.velocities[i3 + 1] *= -1;
            if (Math.abs(pos[i3 + 2]) > 25) this.velocities[i3 + 2] *= -1;
          }
          
          this.geometry.attributes.position.needsUpdate = true;
          
          this.particleSystem.rotation.y += 0.0005;
          this.particleSystem.rotation.x += 0.0002;
        }
      });
    </script>
</head>

<script>
const videoUni = document.querySelector('#videoUni');
const videoFundador = document.querySelector('#videoFundador');
const video8 = document.querySelector('#video8');
const video7a = document.querySelector('#video7a');
let videoActual = videoUni;

const audioBienvenida = document.querySelector('#audioBienvenida');

function desbloquearConMovimiento() {
    audioBienvenida.play().then(() => {
        window.removeEventListener('deviceorientation', desbloquearConMovimiento);
        document.removeEventListener('mousemove', desbloquearConMovimiento);
        console.log("Audio iniciado por sensor de movimiento.");
    }).catch(e => {});
}

window.addEventListener('load', () => {
    setTimeout(() => {
        audioBienvenida.playbackRate = 1.0; 
        audioBienvenida.play().catch(e => {
            window.addEventListener('deviceorientation', desbloquearConMovimiento, {once: true});
            document.addEventListener('mousemove', desbloquearConMovimiento, {once: true});
            document.querySelector('a-scene').addEventListener('enter-vr', desbloquearConMovimiento, {once: true});
        });
    }, 500);
});

const pantalla = document.querySelector('#pantallaVideo');
const grupoCine = document.querySelector('#grupoCine');
const contenedorBtn = document.querySelector('#contenedorBoton');
const contenedorBtnFundador = document.querySelector('#contenedorBotonFundador');
const contenedorBtnLabs = document.querySelector('#contenedorBotonLabs');
const contenedorNuevosLabs = document.querySelector('#contenedorNuevosLabs');
const contenedorBtnTour = document.querySelector('#contenedorBotonTour');
const redNeuronal = document.querySelector('#redNeuronal'); 
const lineaFundador = document.querySelector('#lineaFundador'); 
const lineaLabs = document.querySelector('#lineaLaboratorios');
const lineaNuevosLabs = document.querySelector('#lineaNuevosLabs');
const lineaTour = document.querySelector('#lineaTour'); 
const textoBoton = document.querySelector('#textoBoton');
const textoBotonFundador = document.querySelector('#textoBotonFundador');
const textoBotonLabs = document.querySelector('#textoBotonLabs');
const textoBotonNuevosLabs = document.querySelector('#textoBotonNuevosLabs');
const textoBotonTour = document.querySelector('#textoBotonTour');
const skyPrincipal = document.querySelector('#skyPrincipal');
const skyButacas = document.querySelector('#skyButacas');
const oscurecerButacas = document.querySelector('#oscurecerButacas');
const barraProgreso = document.querySelector('#barraProgreso');
const textoDuracion = document.querySelector('#textoDuracion');
const camara = document.querySelector('#camara');
const imgPausa = document.querySelector('#imgPausa'); // Control del Icono Pausa

const ANCHO_BARRA = 20;

function actualizarBarra() {
  if (!videoActual || isNaN(videoActual.duration)) return;
  const progreso = videoActual.currentTime / videoActual.duration;
  barraProgreso.setAttribute('width', Math.max(0.01, progreso * ANCHO_BARRA));
  barraProgreso.setAttribute('position', `${-ANCHO_BARRA / 2 + (progreso * ANCHO_BARRA) / 2} 0 0.01`);
  
  const m = Math.floor(videoActual.currentTime / 60);
  const s = Math.floor(videoActual.currentTime % 60).toString().padStart(2, '0');
  const md = Math.floor(videoActual.duration / 60);
  const sd = Math.floor(videoActual.duration % 60).toString().padStart(2, '0');
  textoDuracion.setAttribute('value', `${m}:${s} / ${md}:${sd}`);
}

[videoUni, videoFundador, video8, video7a].forEach(v => v.addEventListener('timeupdate', actualizarBarra));

function iniciarCine(videoSeleccionado) {
  videoActual = videoSeleccionado;
  videoActual.playbackRate = 1;
  pantalla.setAttribute('src', `#${videoSeleccionado.id}`);
  pantalla.setAttribute('scale', '0 0 0');

  const rotation = camara.getAttribute('rotation');
  const angleY = rotation.y;
  
  if(videoSeleccionado.id === 'videoFundador') skyButacas.setAttribute('src', '#imgAuditorio2');
  else if(videoSeleccionado.id === 'video8') skyButacas.setAttribute('src', '#imgEvento');
  else if(videoSeleccionado.id === 'video7a') skyButacas.setAttribute('src', '#imgLabsNuevos');
  else skyButacas.setAttribute('src', '#imgAuditorio');

  skyButacas.setAttribute('rotation', `0 ${angleY - 90} 0`);

  const angleRad = (angleY * Math.PI) / 180;
  const posX = -25 * Math.sin(angleRad);
  const posZ = -25 * Math.cos(angleRad);
  
  grupoCine.setAttribute('position', `${posX} 2.5 ${posZ}`);
  grupoCine.setAttribute('rotation', `0 ${angleY} 0`);

  [contenedorBtn, contenedorBtnFundador, contenedorBtnLabs, contenedorNuevosLabs, contenedorBtnTour, redNeuronal, document.querySelector('#panelBienvenida'), skyPrincipal].forEach(el => { if(el) el.setAttribute('visible', 'false'); });
  [skyButacas, oscurecerButacas, grupoCine].forEach(el => el.setAttribute('visible', 'true'));
  oscurecerButacas.emit('luzOff'); 

  // Cambiar a icono de pausa al iniciar
  imgPausa.setAttribute('src', '#icon-pause');

  videoActual.currentTime = 0;
  setTimeout(() => {
    pantalla.emit('videoEntra');
    videoActual.play();
  }, 500);
}

document.querySelector('#btnAccion').addEventListener('click', () => iniciarCine(videoUni));
document.querySelector('#btnFundador').addEventListener('click', () => iniciarCine(videoFundador));
document.querySelector('#btnLaboratorios').addEventListener('click', () => iniciarCine(video8));
document.querySelector('#btnNuevosLabs').addEventListener('click', () => iniciarCine(video7a));

document.querySelector('#btnTour').addEventListener('click', () => {
    window.location.href = 'https://esanlabs.github.io/recorrido-2.0/';
});

// LOGICA ACTUALIZADA DE PAUSA / PLAY (con SVG)
document.querySelector('#btnPausa').addEventListener('click', () => {
  if (videoActual.paused) { 
    videoActual.play(); 
    imgPausa.setAttribute('src', '#icon-pause'); 
  } else { 
    videoActual.pause(); 
    imgPausa.setAttribute('src', '#icon-play'); 
  }
});

document.querySelector('#btnNormal').addEventListener('click', () => { videoActual.playbackRate = 1; });
document.querySelector('#btnRapido').addEventListener('click', () => { videoActual.playbackRate = 2; });
document.querySelector('#btnReset').addEventListener('click', () => { videoActual.currentTime = 0; videoActual.play(); imgPausa.setAttribute('src', '#icon-pause'); });
document.querySelector('#btnSalir').addEventListener('click', () => { videoActual.pause(); videoActual.dispatchEvent(new Event('ended')); });

function finalizarVideo() {
  pantalla.emit('videoSale');
  
  setTimeout(() => {
    grupoCine.setAttribute('visible', 'false');
    skyButacas.setAttribute('visible', 'false');
    skyPrincipal.setAttribute('visible', 'true');
    oscurecerButacas.emit('luzOn');

    // Mantenemos los textos cortos y profesionales para que siga viéndose bien
    if(videoActual.id === 'videoUni') textoBoton.setAttribute('value', 'Nuestra\nHistoria');
    if(videoActual.id === 'videoFundador') textoBotonFundador.setAttribute('value', 'Nuestro\nFundador');
    if(videoActual.id === 'video8') textoBotonLabs.setAttribute('value', 'Carreras que\nTransforman');
    if(videoActual.id === 'video7a') textoBotonNuevosLabs.setAttribute('value', 'Laboratorios\nTech');
    
    textoBotonTour.setAttribute('value', 'Tour del\nCampus');

    const elementosConAnimacion = [
      contenedorBtn, contenedorBtnFundador, contenedorBtnLabs, contenedorNuevosLabs, contenedorBtnTour,
      lineaFundador, lineaLabs, lineaNuevosLabs, lineaTour
    ];

    elementosConAnimacion.forEach(el => {
      el.removeAttribute('animation');
      el.removeAttribute('animation__start');
      el.removeAttribute('animation__end');
    });

    contenedorBtn.setAttribute('position', '-2.1 1.6 -15');
    contenedorBtnFundador.setAttribute('position', '-0.9 1.6 -15');
    contenedorBtnLabs.setAttribute('position', '-0.3 1.6 -15');
    contenedorNuevosLabs.setAttribute('position', '0.9 1.6 -15');
    contenedorBtnTour.setAttribute('position', '2.1 1.6 -15');
    
    lineaFundador.setAttribute('line', {start: '-2.1 1.6 -15', end: '-0.9 2.1 -15'});
    lineaLabs.setAttribute('line', {start: '-0.9 2.1 -15', end: '-0.3 1.1 -15'});
    lineaNuevosLabs.setAttribute('line', {start: '-0.3 1.1 -15', end:  '0.9 2.1 -15'});
    lineaTour.setAttribute('line', {start: '-0.3 1.1 -15', end: '2.1 1.6 -15'});

    [contenedorBtn, contenedorBtnFundador, contenedorBtnLabs, contenedorNuevosLabs, contenedorBtnTour, redNeuronal].forEach(el => el.setAttribute('visible', 'true'));

    setTimeout(() => {
      const dur = 6000;
      const ease = "easeOutCubic";

      contenedorBtn.setAttribute('animation', `property: position; from: -2.1 1.6 -15; to: -2.1 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
      contenedorBtnFundador.setAttribute('animation', `property: position; from: -0.9 1.6 -15; to: -0.9 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
      contenedorBtnLabs.setAttribute('animation', `property: position; from: -0.3 1.6 -15; to: -0.3 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
      contenedorNuevosLabs.setAttribute('animation', `property: position; from: 0.9 1.6 -15; to: 0.9 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
      contenedorBtnTour.setAttribute('animation', `property: position; from: 2.1 1.6 -15; to: 2.1 1.6 -2.5; dur: ${dur}; easing: ${ease}`);

      lineaFundador.setAttribute('animation__start', `property: line.start; from: -2.1 1.6 -15; to: -2.1 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
      lineaFundador.setAttribute('animation__end', `property: line.end; from: -0.9 2.1 -15; to: -0.9 2.1 -2.5; dur: ${dur}; easing: ${ease}`);

      lineaLabs.setAttribute('animation__start', `property: line.start; from: -0.9 2.1 -15; to: -0.9 2.1 -2.5; dur: ${dur}; easing: ${ease}`);
      lineaLabs.setAttribute('animation__end', `property: line.end; from: -0.3 1.1 -15; to: -0.3 1.1 -2.5; dur: ${dur}; easing: ${ease}`);

      lineaNuevosLabs.setAttribute('animation__start', `property: line.start; from: -0.3 1.1 -15; to: -0.3 1.1 -2.5; dur: ${dur}; easing: ${ease}`);
      lineaNuevosLabs.setAttribute('animation__end', `property: line.end; from: 0.9 2.1 -15; to: 0.9 2.1 -2.5; dur: ${dur}; easing: ${ease}`);
      
      lineaTour.setAttribute('animation__start', `property: line.start; from: -0.3 1.1 -15; to: -0.3 1.1 -2.5; dur: ${dur}; easing: ${ease}`);
      lineaTour.setAttribute('animation__end', `property: line.end; from: 2.1 1.6 -15; to: 2.1 1.6 -2.5; dur: ${dur}; easing: ${ease}`);
    }, 100);

  }, 1500);
}

[videoUni, videoFundador, video8, video7a].forEach(v => v.addEventListener('ended', finalizarVideo));
</script>
</body>
</html>
